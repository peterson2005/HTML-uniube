    <main>
        <h1>Fale Conosco</h1>
        <form action="#" method="post" class="form-contato">
            <div>
                <label>Nome:</label>
                <input type="text" name="nome" required>
            </div>

            <div>
                <label>Área de Interesse:</label>
                <div class="opcoes-radio">
                    <input type="radio" name="area" value="dev" checked> Dev
                    <input type="radio" name="area" value="infra"> Infra
                    <input type="radio" name="area" value="dados"> Dados
                </div>
            </div>

            <div>
                <label>Estado:</label>
                <select name="estado">
                    <option value="mg">Minas Gerais</option>
                    <option value="sp">São Paulo</option>
                    <option value="rj">Rio de Janeiro</option>
                </select>
            </div>

            <div>
                <label>Mensagem:</label>
                <textarea name="mensagem" rows="5"></textarea>
            </div>

            <button type="submit" style="padding: 10px; cursor: pointer;">Enviar</button>
        </form>
    </main>
