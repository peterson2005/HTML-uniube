    <main>
        <h1>4) Manipulação de Nomes</h1>
        <button id="lista">Criar Lista</button>
        <p id="resulist" style="margin-top: 20px; text-align: left; width: 100%;"></p>

<script>
    document.getElementById('lista').addEventListener('click', function () {
        let qtd = parseInt(prompt("Informe a quantidade de nomes:"));
        if (isNaN(qtd) || qtd <= 0) {
            alert("Quantidade inválida!");
            return;
        }
        let nomes = [];
        for (let i = 0; i < qtd; i++) {
            let nome = prompt("Informe o " + (i + 1) + "º nome:");
            nomes.push(nome);
        }
        let ordemAlfabetica = [...nomes].sort();
        let maiusculos = nomes.map(n => n.toUpperCase());

        let output = "<strong>a) Quantidade de nomes digitados:</strong> " + nomes.length + "<br><br>" +
            "<strong>b) Ordem em que foram digitados:</strong> " + nomes.join(", ") + "<br><br>" +
            "<strong>c) Ordem alfabética:</strong> " + ordemAlfabetica.join(", ") + "<br><br>" +
            "<strong>d) Nomes em Maiúsculo:</strong> " + maiusculos.join(", ");

        document.getElementById('resulist').innerHTML = output;
    });
</script>
