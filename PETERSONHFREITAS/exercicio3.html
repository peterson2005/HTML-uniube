    <main>
        <h1>3) Números Pares</h1>

<script>
    document.getElementById('calculo').addEventListener('click', function () {
        let numero;
        do {
            numero = parseInt(prompt("Digite um número maior que 0:"));
            if (isNaN(numero) || numero <= 0) {
                alert("Número inválido! Repita o número.");
            }
        } while (isNaN(numero) || numero <= 0);
        let pares = [];
        let soma = 0;

        for (let i = 1; i <= numero; i++) {
            if (i % 2 === 0) {
                pares.push(i);
                soma += i;
            }
        }
        let output = "Você digitou o número " + numero + ".<br>" +
            "Números pares: " + pares.join(", ") + ".<br>" +
            "Quantidade de pares: " + pares.length + " números.<br>" +
            "Soma dos pares: " + soma + ".";

        document.getElementById('resulcalc').innerHTML = output;
    });
</script>
