    <main>
        <h1>Exercicio 02.</h1>
        <button id="verificar-mes">Escolher Mês</button>

    </main>

<script>
    const meses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
    document.getElementById('verificar-mes').addEventListener('click', function () {
        let entrada = prompt("Digite o número do mês (01 a 12):");
        let n = parseInt(entrada);

        if (n >= 1 && n <= 12) {
            document.getElementById('resul-mes').innerText = entrada + " - " + meses[n - 1];
        } else {
            alert("Mês inválido! Digite entre 01 e 12.");
        }
    });
</script>
